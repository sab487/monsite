<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Sabrina Askour</title>
    <style>
        :root {
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #4a4a4a;
            --color-border-tertiary: #e1e1e1;
            --color-background-primary: #ffffff;
            --color-background-secondary: #f9f9f9;
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: var(--font-sans); 
            background-color: var(--color-background-primary);
            color: var(--color-text-primary);
            line-height: 1.5;
        }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 10%; border-bottom: 0.5px solid var(--color-border-tertiary);
            background: var(--color-background-primary); position: sticky; top: 0; z-index: 10;
        }
        .nav-logo { font-size: 18px; font-weight: 600; color: #3b8fd4; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            font-size: 14px; color: var(--color-text-secondary); text-decoration: none;
            padding: 8px 12px; border-radius: var(--border-radius-md);
            transition: all 0.2s;
        }
        .nav-links a:hover { background: var(--color-background-secondary); color: #3b8fd4; }

        /* Hero Section */
        .hero {
            padding: 80px 10%;
            background: linear-gradient(160deg, #e8f4fd 0%, #f5faff 60%, #ffffff 100%);
            border-bottom: 0.5px solid var(--color-border-tertiary);
        }
        .hero-tag {
            display: inline-block; font-size: 12px; color: #3b8fd4; font-weight: 600;
            background: #dbeeff; padding: 6px 16px; border-radius: 20px; margin-bottom: 20px;
        }
        .hero h1 { font-size: 42px; font-weight: 600; margin-bottom: 10px; color: #1a1a1a; }
        .hero h2 { font-size: 20px; font-weight: 400; color: var(--color-text-secondary); margin-bottom: 24px; }
        .hero p { font-size: 16px; color: var(--color-text-secondary); line-height: 1.8; max-width: 650px; margin-bottom: 32px; }

        /* Buttons */
        .btn-group { display: flex; gap: 15px; }
        .btn-primary {
            background: #3b8fd4; color: #fff; padding: 12px 24px;
            border-radius: var(--border-radius-md); text-decoration: none; font-weight: 500;
        }
        .btn-secondary {
            border: 1.5px solid #3b8fd4; color: #3b8fd4; padding: 12px 24px;
            border-radius: var(--border-radius-md); text-decoration: none; font-weight: 500;
        }

        /* Sections */
        section { padding: 60px 10%; }
        .section-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .section-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 40px; }

        /* Timeline */
        .timeline { display: flex; flex-direction: column; }
        .tl-item { display: flex; gap: 25px; padding-bottom: 35px; position: relative; }
        .tl-item:not(:last-child)::before {
            content: ''; position: absolute; left: 11px; top: 25px;
            width: 2px; height: 100%; background: #dbeeff;
        }
        .tl-dot {
            width: 24px; height: 24px; border-radius: 50%; background: #fff;
            border: 3px solid #3b8fd4; flex-shrink: 0; z-index: 1;
        }
        .tl-date { font-size: 13px; color: #3b8fd4; font-weight: 700; margin-bottom: 4px; }
