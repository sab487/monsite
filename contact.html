<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sabrina Askour</title>
    <style>
        :root {
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #4a4a4a;
            --color-border-tertiary: #e1e1e1;
            --color-background-primary: #ffffff;
            --color-background-secondary: #f9f9f9;
            --border-radius-lg: 16px;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --blue-main: #3b8fd4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-sans); 
            background: #f4f7fa; 
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 10%; border-bottom: 0.5px solid var(--color-border-tertiary);
            background: var(--color-background-primary); width: 100%;
        }
        .nav-logo { font-size: 18px; font-weight: 600; color: var(--blue-main); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { font-size: 14px; color: var(--color-text-secondary); text-decoration: none; }

        /* Conteneur de la Carte */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .contact-card {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid var(--color-border-tertiary);
        }

        .card-header {
            background: var(--blue-main);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .card-header h2 { font-size: 24px; font-weight: 600; }
        .card-header p { font-size: 14px; opacity: 0.9; margin-top: 5px; }

        .card-body { padding: 40px; }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 30px;
        }

        .contact-item:last-child { margin-bottom: 0; }

        .icon-box {
            width: 45px;
            height: 45px;
            background: #e8f4fd;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: var(--blue-main);
            flex-shrink: 0;
        }

        .contact-text .label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--blue-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .contact-text .value {
            font-size: 16px;
            color: var(--color-text-primary);
            text-decoration: none;
            word-break: break-all;
        }

        a.value:hover { color: var(--blue-main); text-decoration: underline; }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--color-text-secondary);
            border-top: 1px solid var(--color-border-tertiary);
            background: white;
        }
    </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Sabrina Askour</a>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
    <a href="bts-sio.html">BTS SIO</a>
    <a href="parcours.html">Parcours</a>
    <a href="contact.html" style="font-weight: 600; color: var(--blue-main);">Contact</a>
  </div>
</nav>

<main class="main-content">
    <div class="contact-card">
        <div class="card-header">
            <h2>Mes Coordonnées</h2>
            <p>N'hésitez pas à me contacter</p>
        </div>

        <div class="card-body">
            <div class="contact-item">
                <div class="icon-box">📧</div>
                <div class="contact-text">
                    <span class="label">Email</span>
                    <a href="mailto:sabrina2ask@gmail.com" class="value">sabrina2ask@gmail.com</a>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon-box">💼</div>
                <div class="contact-text">
                    <span class="label">Linkedin</span>
                    <a href="#" class="value">Sabrina Askour</a>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon-box">🐙</div>
                <div class="contact-text">
                    <span class="label">Github</span>
                    <a href="https://github.com/sab487" class="value">sab487</a>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon-box">📍</div>
                <div class="contact-text">
                    <span class="label">Localisation</span>
                    <span class="value">Région Parisienne (95), France</span>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    © 2026 Sabrina Askour - Portfolio SISR
</footer>

</body>
</html>
