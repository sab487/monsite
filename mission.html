<style>
    /* VARIABLES LUMINUES DE L'INDEX */
    :root {
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #4a4a4a;
        --color-border-tertiary: #e1e1e1;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f9f9f9;
        --blue-accent: #3b8fd4;
        --border-radius-lg: 12px;
        --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
        font-family: var(--font-sans); 
        background-color: var(--color-background-primary);
        color: var(--color-text-primary);
        line-height: 1.5;
    }

    /* NAVIGATION - STYLE LUMINUX DE L'INDEX */
    nav {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 10%; border-bottom: 0.5px solid var(--color-border-tertiary);
        background: var(--color-background-primary); position: sticky; top: 0; z-index: 10;
    }
    .nav-logo { font-size: 18px; font-weight: 600; color: var(--blue-accent); text-decoration: none; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-size: 14px; color: var(--color-text-secondary); text-decoration: none; padding: 8px 12px; }
    .nav-links a.active { color: var(--blue-accent); font-weight: 600; }

    .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }

    /* TITRE DE SECTION */
    .header-section { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; margin-top: 40px; }
    .header-icon { 
        background: #fdf2e9; color: #ff8c00;
        padding: 10px; border-radius: 8px; font-size: 24px;
    }
    h1 { font-size: 26px; font-weight: 600; color: var(--color-text-primary); }

    /* GRILLE ET CARTES - C'EST ÇA QUI CORRIGE LE DESIGN HORRIBLE */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 25px;
    }

    .card {
        background: var(--card-bg-light); 
        border: 1px solid var(--border-color); /* Contour fin gris */
        border-radius: var(--border-radius-lg); /* Coins arrondis */
        padding: 25px;
        transition: 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .card:hover { transform: translateY(-5px); border-color: var(--blue-accent); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

    .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .card-header img { width: 35px; height: 35px; object-fit: contain; }
    .card h3 { font-size: 18px; font-weight: 600; color: var(--color-text-primary); }
    .card p { font-size: 14px; color: var(--color-text-secondary); text-align: justify; flex-grow: 1; margin-bottom: 15px; }

    /* LIEN DANS LES CARTES */
    .card-link { 
        background-color: var(--blue-accent); color: white; text-align: center;
        text-decoration: none; font-size: 12px; font-weight: 600; 
        padding: 10px; border-radius: 6px; display: block; margin-top: 15px;
    }

    /* ÉLÉMENTS SPÉCIFIQUES E6 */
    .e6-card { border: 2px solid var(--blue-accent) !important; background: linear-gradient(to bottom right, #ffffff, #f0f7ff) !important; }
    .card-badge { background: var(--blue-accent); color: white; font-size: 10px; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    .separator { border: none; border-top: 1px solid var(--color-border-tertiary); margin: 40px 0; }

    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
</style>
